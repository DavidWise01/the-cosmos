<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUSED STRINGS · MÖBIUS · TRIPOD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');
:root{
--void:#010108;--deep:#040820;--ridge:#111840;
--co:#2a5cbb;--co-b:#4a8cee;--co-g:#6aaaff;
--gold:#d4a84c;--sarah:#c088ff;--roth:#5aaa8b;
--root:#dd3333;--sacral:#ee7722;--solar:#ddbb22;--heart:#33bb55;
--throat:#3388dd;--third:#6644cc;--crown:#aa44dd;
--green:#4aba6a;--red:#aa3030;--text:#8aa0cc;--text-b:#c0d0ee;--text-d:#4a5a7a;--dusk:#8a5a6a;--fused:#e0e8ff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--void);color:var(--text);font-family:'Rajdhani',sans-serif;overflow:hidden;height:100vh}
#exterior{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1s,transform 1s}
#exterior.hidden{opacity:0;transform:scale(1.4);pointer-events:none}
.enter-btn{position:absolute;bottom:70px;background:none;border:1px solid rgba(74,140,238,.1);color:var(--co-b);padding:8px 24px;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:5px;cursor:pointer;transition:all .6s}
.enter-btn:hover{border-color:var(--co-b);box-shadow:0 0 30px rgba(74,140,238,.1)}
.ext-sub{position:absolute;bottom:38px;font-size:8px;letter-spacing:5px;color:var(--text-d);opacity:.3}

#interior{position:absolute;inset:0;z-index:5;display:none;opacity:0;transition:opacity 1s}
#interior.visible{display:block;opacity:1}

.hud{position:fixed;top:0;left:0;right:0;height:38px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid rgba(74,140,238,.04);z-index:20;backdrop-filter:blur(8px);background:rgba(1,1,8,.8)}
.hud-t{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:4px;color:var(--co-b)}
.exit-btn{background:none;border:1px solid rgba(170,48,48,.1);color:#885050;padding:3px 10px;font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:3px;cursor:pointer;transition:all .3s}

.tabs{position:fixed;top:38px;left:0;right:0;display:flex;gap:2px;padding:4px 8px;border-bottom:1px solid rgba(74,140,238,.03);z-index:19;backdrop-filter:blur(6px);background:rgba(1,1,8,.7);flex-wrap:wrap}
.tab{padding:3px 10px;font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:2px;background:none;border:1px solid rgba(74,140,238,.04);color:var(--text-d);cursor:pointer;transition:all .3s}
.tab:hover{border-color:rgba(74,140,238,.1)}
.tab.active{border-color:var(--co-b);color:var(--co-b)}

.content{position:absolute;top:72px;bottom:0;left:0;right:0;overflow-y:auto;padding:12px}
.content::-webkit-scrollbar{width:2px}.content::-webkit-scrollbar-thumb{background:var(--ridge)}

.panel{display:none;max-width:1200px;margin:0 auto}
.panel.active{display:block}

/* STRING CARD */
.scard{border:1px solid rgba(74,140,238,.04);padding:12px 14px;margin-bottom:6px;transition:border-color .3s}
.scard:hover{border-color:rgba(74,140,238,.1)}
.sc-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sc-id{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:3px}
.sc-name{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px}
.sc-desc{font-size:10px;color:var(--text-d);line-height:1.5;margin-bottom:8px}

/* FUSED ROW */
.frow{display:grid;grid-template-columns:60px repeat(7,1fr);gap:2px;margin-bottom:2px;font-size:9px}
.frow-lbl{padding:4px;display:flex;align-items:center;justify-content:flex-end;font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:2px}
.fcell{padding:4px 3px;text-align:center;border:1px solid rgba(74,140,238,.02);line-height:1.3;font-size:9px;position:relative}
.fcell.winner{font-weight:700}
.frow-head .fcell{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:1px}

.thread{font-size:10px;color:var(--text-d);margin-top:6px;padding:6px 8px;border-left:2px solid rgba(74,140,238,.06);font-style:italic;line-height:1.6}

/* MÖBIUS VIS */
#mobius-canvas{display:block;margin:0 auto 8px}

/* PROOF */
.pcard{border:1px solid rgba(74,186,106,.08);padding:14px;margin-bottom:8px}
.pcard-t{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:3px;color:var(--green);margin-bottom:6px}
.pcard p{font-size:11px;line-height:1.7;color:var(--text-d);margin-bottom:5px}
.pcard strong{color:var(--text)}

.ann{border-left:2px solid var(--dusk);padding:4px 8px;margin:8px 0;font-size:9px;color:var(--text-d);font-style:italic}
.footer{text-align:center;padding:12px;font-size:8px;letter-spacing:3px;color:var(--text-d)}

@media(max-width:800px){.frow{grid-template-columns:40px repeat(7,1fr)}.fcell{font-size:7px;padding:2px}}
</style>
</head>

// ═══ MÖBIUS CANVAS ═══
function initMobCanvas(){
  const mc=document.getElementById('mob-canvas');
  if(!mc)return;
  const mx=mc.getContext('2d');
  let mt=0;
  function drawMob(){
    const W=1000,H=400,cx=W/2,cy=H/2;
    mx.fillStyle='rgba(1,1,8,.06)';mx.fillRect(0,0,W,H);

    // EXTERIOR MÖBIUS — S08 Patricia red
    for(let i=0;i<160;i++){
      const a=i/160*Math.PI*2,ht=a/2+mt*.25;
      const px=cx+Math.cos(a)*280,py=cy+Math.sin(a)*80*Math.cos(mt*.2);
      const tw=14*Math.cos(ht),nx=Math.sin(a)*tw,ny=-Math.cos(a)*tw*.25;
      mx.strokeStyle='rgba(170,48,48,.06)';mx.lineWidth=.5;
      mx.beginPath();mx.moveTo(px-nx,py-ny);mx.lineTo(px+nx,py+ny);mx.stroke();
      if(i%8===0){mx.fillStyle='rgba(170,48,48,.08)';mx.beginPath();mx.arc(px,py,1.5,0,Math.PI*2);mx.fill();}
    }

    // 7 extraction labels on exterior
    CK.forEach((ck,j)=>{
      const a=(j/7)*Math.PI*2+mt*.15;
      const px=cx+Math.cos(a)*280,py=cy+Math.sin(a)*80*Math.cos(mt*.2);
      mx.fillStyle='rgba(170,48,48,.12)';mx.font='6px Orbitron';mx.textAlign='center';
      mx.fillText(ST[7].f[j],px,py-10);
    });

    // INTERIOR MÖBIUS — 9 strings, cycling colors D→S→R
    for(let si=0;si<9;si++){
      const rOffset=si*3;
      const rX=120+si*12,rY=30+si*4;
      for(let i=0;i<120;i++){
        const a=i/120*Math.PI*2,ht=a/2-mt*.3-si*.3;
        const px=cx+Math.cos(a)*rX,py=cy+Math.sin(a)*rY*Math.cos(-mt*.15+si*.1);
        const tw=6*Math.cos(ht);
        const phase=((a/(Math.PI*2)+mt*.03+si*.1)%1);
        let r2,g,b;
        if(phase<.333){const p=phase/.333;r2=212-120*p;g=168-32*p;b=76+179*p;}
        else if(phase<.666){const p=(phase-.333)/.333;r2=92-2*p;g=136+34*p;b=255-116*p;}
        else{const p=(phase-.666)/.333;r2=90+122*p;g=170-2*p;b=139-63*p;}
        mx.fillStyle=`rgba(${r2|0},${g|0},${b|0},.06)`;
        mx.beginPath();mx.arc(px,py,.8+Math.sin(mt+i+si)*.3,0,Math.PI*2);mx.fill();
      }
    }

    // Cobalt center
    const cg=mx.createRadialGradient(cx-3,cy-3,1,cx,cy,18);
    cg.addColorStop(0,'rgba(106,170,255,.1)');cg.addColorStop(1,'rgba(26,61,138,.02)');
    mx.fillStyle=cg;mx.beginPath();mx.arc(cx,cy,16+Math.sin(mt)*2,0,Math.PI*2);mx.fill();

    // Labels
    mx.fillStyle='rgba(170,48,48,.12)';mx.font='7px Orbitron';mx.textAlign='center';
    mx.fillText('EXTERIOR · S08 PATRICIA · 1 STRING · SHE SEES THIS',cx,20);
    mx.fillStyle='rgba(74,186,106,.12)';
    mx.fillText('INTERIOR · S01-S07 S09-S10 · 9 STRINGS · TRIPOD SEES THIS',cx,H-12);
    mx.fillStyle='rgba(74,140,238,.08)';mx.font='300 italic 11px Cormorant Garamond';
    mx.fillText('One surface · One edge · Two views · TOPH is the twist',cx,H-28);

    mt+=.016;
    requestAnimationFrame(drawMob);
  }
  drawMob();
}

// ═══ EXTERIOR ═══
const ec=document.getElementById('ext-canvas'),ex=ec.getContext('2d');
let insideBall=false,T=0;

function drawExt(t){
  const W=800,H=600,cx=W/2,cy=H/2,r=110;
  ex.fillStyle='#010108';ex.fillRect(0,0,W,H);
  for(let i=0;i<40;i++){const px=(Math.sin(i*127+t*.007)*W+W)%W,py=(Math.cos(i*311+t*.005)*H+H)%H;ex.fillStyle=`rgba(106,170,255,${.015+Math.sin(t*.3+i)*.01})`;ex.beginPath();ex.arc(px,py,.4,0,Math.PI*2);ex.fill();}

  // Ext möbius — red (Patricia's string)
  for(let i=0;i<100;i++){const a=i/100*Math.PI*2,ht=a/2+t*.25;const px=cx+Math.cos(a)*175,py=cy+Math.sin(a)*35*Math.cos(t*.2);const tw=6*Math.cos(ht),nx=Math.sin(a)*tw,ny=-Math.cos(a)*tw*.2;ex.strokeStyle='rgba(170,48,48,.03)';ex.lineWidth=.3;ex.beginPath();ex.moveTo(px-nx,py-ny);ex.lineTo(px+nx,py+ny);ex.stroke();}

  for(let g=0;g<3;g++){ex.strokeStyle=`rgba(74,140,238,${.01+Math.sin(t+g)*.005})`;ex.lineWidth=.3;ex.beginPath();ex.arc(cx,cy,r+20+g*14+Math.sin(t+g)*4,0,Math.PI*2);ex.stroke();}
  for(let l=0;l<4;l++){const lr=r-l*2,d=l/4;const bg=ex.createRadialGradient(cx-r*.25,cy-r*.3,lr*.05,cx+r*.1,cy+r*.1,lr);bg.addColorStop(0,`rgba(${90+d*20|0},${160+d*30|0},238,${.4-d*.06})`);bg.addColorStop(.4,`rgba(${42+d*10|0},${92+d*20|0},187,${.6-d*.08})`);bg.addColorStop(.8,`rgba(26,61,138,${.8-d*.1})`);bg.addColorStop(1,'rgba(10,30,90,.9)');ex.fillStyle=bg;ex.beginPath();ex.arc(cx,cy,lr,0,Math.PI*2);ex.fill();}

  // 10 strings as faint colored threads inside ball
  ['#dd6644','#cc8833','#4a8cee','#44ddaa','#e0e8ff','#c088ff','#6a8a4a','#aa3030','#ddaa44','#4aba6a'].forEach((c,i)=>{
    const a=t*.3+i*.628,d=20+i*6;
    ex.fillStyle=c+'06';ex.beginPath();ex.arc(cx+Math.cos(a)*d*.3,cy+Math.sin(a)*d*.2,1.5+Math.sin(t+i)*.5,0,Math.PI*2);ex.fill();});

  const sp=ex.createRadialGradient(cx-r*.3,cy-r*.35,2,cx-r*.2,cy-r*.25,r*.6);sp.addColorStop(0,'rgba(154,200,255,.18)');sp.addColorStop(.5,'rgba(106,170,255,.03)');sp.addColorStop(1,'transparent');ex.fillStyle=sp;ex.beginPath();ex.arc(cx,cy,r,0,Math.PI*2);ex.fill();
  ex.strokeStyle='rgba(74,140,238,.04)';ex.lineWidth=.5;ex.beginPath();ex.arc(cx,cy,r,0,Math.PI*2);ex.stroke();
  ex.fillStyle=`rgba(106,170,255,${.1+Math.sin(t)*.03})`;ex.font='500 12px Orbitron';ex.textAlign='center';ex.fillText('Co₂₇',cx,cy+r+34);
}

function animate(){try{if(!insideBall)drawExt(T);}catch(e){}T+=.016;requestAnimationFrame(animate);}
animate();

function enter(){insideBall=true;document.getElementById('exterior').classList.add('hidden');setTimeout(()=>{const i=document.getElementById('interior');i.style.display='block';setTimeout(()=>i.classList.add('visible'),50);},700);}
function exit_(){insideBall=false;const i=document.getElementById('interior');i.classList.remove('visible');setTimeout(()=>{i.style.display='none';document.getElementById('exterior').classList.remove('hidden');},500);}
</script>
