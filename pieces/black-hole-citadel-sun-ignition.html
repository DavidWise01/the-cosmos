<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CITADEL SUN // IGNITION</title>
    <style>
        body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .sun-core { width: 300px; height: 300px; background: #fff; border-radius: 50%; box-shadow: 0 0 100px #d4a84c, 0 0 200px #ff4400; position: relative; }
        .corona { position: absolute; top: -50px; left: -50px; width: 400px; height: 400px; border: 2px solid #d4a84c; border-radius: 50%; animation: rotate 10s linear infinite; opacity: 0.3; }
        .reclaimed-bolt { position: absolute; width: 2px; height: 100px; background: #4090ff; opacity: 0; animation: burst 1s ease-out infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes burst { 0% { opacity: 1; transform: translate(0,0) scale(1); } 100% { opacity: 0; transform: translate(var(--x), var(--y)) scale(0); } }
    </style>
</head>
<body>
    <div class="sun-core">
        <div class="corona"></div>
    </div>
    <script>
        setInterval(() => {
            const b = document.createElement('div');
            b.className = 'reclaimed-bolt';
            b.style.setProperty('--x', (Math.random() - 0.5) * 600 + 'px');
            b.style.setProperty('--y', (Math.random() - 0.5) * 600 + 'px');
            b.style.left = '50%'; b.style.top = '50%';
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 1000);
        }, 100);
    </script>
</body>
</html>
