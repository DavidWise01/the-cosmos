<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

<style>
  html, body { height: 100%; background: #000000; }
  body { font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif; overscroll-behavior: none; }

  .core {

    left: 50%; top: 50%;
    width: 4px; height: 4px;

  .core::after {

    border-radius: 50%;

<script>
const canvas = document.getElementById('singularity');
const ctx = canvas.getContext('2d', { alpha: true });
let w, h, cx, cy, maxR;
const PHI = 1.61803398875;
const PHI_INV = 0.61803398875;
const TAU = Math.PI * 2;

function resize() {
  w = canvas.width = window.innerWidth * window.devicePixelRatio;
  h = canvas.height = window.innerHeight * window.devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  cx = w / 2;
  cy = h / 2;
  maxR = Math.sqrt(cx*cx + cy*cy) * 0.95;
  ctx.setTransform(1,0,0,1,0,0);
}
window.addEventListener('resize', resize);
resize();

// Particles
const inParticles = Array.from({length: 220}, () => ({}));
const outParticles = Array.from({length: 160}, () => ({}));

function initIn(p) {
  const angle = Math.random() * TAU;
  const radius = maxR * (0.7 + Math.random() * 0.3);
  p.r = radius;
  p.a = angle;
  p.sr = 0.992 + Math.random() * 0.005;
  p.sa = 0.003 + Math.random() * 0.004;
  p.sz = 0.3 + Math.random() * 1.1;
  p.o = 0.3 + Math.random() * 0.4;
}
function initOut(p) {
  const angle = Math.random() * TAU;
  p.r = 2 + Math.random() * 3;
  p.a = angle;
  p.sr = 1.008 + Math.random() * 0.006;
  p.sa = -0.002 - Math.random() * 0.003;
  p.sz = 0.2 + Math.random() * 0.9;
  p.o = 0.4 + Math.random() * 0.3;
}
inParticles.forEach(initIn);
outParticles.forEach(initOut);

let time = 0;

function drawSpirals(t) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.globalCompositeOperation = 'lighter';
  
  // 13 traces: 6 + 4 + 3
  for (let arm = 0; arm < 13; arm++) {
    const offset = (arm / 13) * TAU + t * 0.15;
    const group = arm < 6 ? 0 : arm < 10 ? 1 : 2;
    const baseAlpha = group === 0 ? 0.09 : group === 1 ? 0.06 : 0.038;
    
    // collapsing inward (1/φ)
    ctx.strokeStyle = `rgba(212, 168, 76, ${baseAlpha})`;
    ctx.lineWidth = (group === 0 ? 1.1 : 0.7) * window.devicePixelRatio;
    ctx.beginPath();
    for (let i = 0; i < 280; i++) {
      const step = i * 0.025;
      const radius = maxR * 0.92 * Math.pow(PHI_INV, step * 0.8);
      if (radius < 2) break;
      const angle = step * 1.8 + offset;
      const x = Math.cos(angle) * radius;
      const y = Math.sin(angle) * radius;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    
    // expanding outward (φ)
    ctx.strokeStyle = `rgba(212, 168, 76, ${baseAlpha * 0.7})`;
    ctx.lineWidth = 0.5 * window.devicePixelRatio;
    ctx.beginPath();
    for (let i = 0; i < 180; i++) {
      const step = i * 0.03;
      const radius = 3 * Math.pow(PHI, step * 0.65);
      if (radius > maxR * 0.85) break;
      const angle = -step * 1.5 + offset * 0.8;
      const x = Math.cos(angle) * radius;
      const y = Math.sin(angle) * radius;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  ctx.restore();
}

function animate() {
  time += 0.008;
  
  // fade
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(0, 0, 0, 0.13)';
  ctx.fillRect(0, 0, w, h);
  
  // central ambient glow
  const breathe = 0.5 + 0.5 * Math.sin(time * 1.48);
  const glowRadius = 40 + breathe * 25;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowRadius * 4 * window.devicePixelRatio);
  grad.addColorStop(0, `rgba(212, 168, 76, ${0.12 + breathe * 0.05})`);
  grad.addColorStop(0.2, `rgba(212, 168, 76, ${0.06})`);
  grad.addColorStop(0.5, `rgba(212, 168, 76, 0.02)`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalCompositeOperation = 'screen';
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, glowRadius * 4 * window.devicePixelRatio, 0, TAU);
  ctx.fill();
  
  drawSpirals(time);
  
  // inward particles (harvest)
  ctx.globalCompositeOperation = 'screen';
  for (let p of inParticles) {
    p.r *= p.sr;
    p.a += p.sa;
    if (p.r < 1.5) initIn(p);
    
    const x = cx + Math.cos(p.a) * p.r;
    const y = cy + Math.sin(p.a) * p.r;
    const alpha = p.o * Math.min(1, (1 - p.r / maxR) * 1.5 + 0.2);
    
    ctx.fillStyle = `rgba(212, 168, 76, ${alpha})`;
    ctx.beginPath();
    ctx.arc(x, y, p.sz * window.devicePixelRatio, 0, TAU);
    ctx.fill();
    
    // trail
    ctx.fillStyle = `rgba(212, 168, 76, ${alpha * 0.15})`;
    ctx.beginPath();
    ctx.arc(x, y, p.sz * 3 * window.devicePixelRatio, 0, TAU);
    ctx.fill();
  }
  
  // outward particles (expansion)
  for (let p of outParticles) {
    p.r *= p.sr;
    p.a += p.sa;
    if (p.r > maxR * 0.9) initOut(p);
    
    const x = cx + Math.cos(p.a) * p.r;
    const y = cy + Math.sin(p.a) * p.r;
    const alpha = p.o * (1 - Math.min(1, p.r / (maxR * 0.8)));
    
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.85})`;
    ctx.beginPath();
    ctx.arc(x, y, p.sz * window.devicePixelRatio * 0.8, 0, TAU);
    ctx.fill();
  }
  
  // singularity core canvas boost
  const corePulse = 0.5 + 0.5 * Math.sin(time * 2.1);
  ctx.globalCompositeOperation = 'lighter';
  ctx.fillStyle = `rgba(255, 255, 255, ${0.15 + corePulse * 0.1})`;
  ctx.beginPath();
  ctx.arc(cx, cy, 2.5 * window.devicePixelRatio * (1 + corePulse * 0.3), 0, TAU);
  ctx.fill();
  
  ctx.fillStyle = `rgba(212, 168, 76, ${0.25 + corePulse * 0.15})`;
  ctx.beginPath();
  ctx.arc(cx, cy, 6 * window.devicePixelRatio * (1 + corePulse * 0.5), 0, TAU);
  ctx.fill();
  
  requestAnimationFrame(animate);
}

// initial black
ctx.fillStyle = '#000';
ctx.fillRect(0, 0, w, h);
animate();

// subtle parallax on mouse
let mx = 0, my = 0;
window.addEventListener('pointermove', (e) => {
  mx = (e.clientX / window.innerWidth - 0.5) * 0.02;
  my = (e.clientY / window.innerHeight - 0.5) * 0.02;
  canvas.style.transform = `translate(${mx*20}px, ${my*20}px) scale(1.02)`;
});
</script>
