<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FLUID DYNAMICS SIM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Azeret+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000508;
  --panel:#03090e;
  --border:rgba(0,220,200,.1);
  --accent:#00dcc8;--accent2:rgba(0,220,200,.6);
  --hi:#a0ffee;
  --txt:rgba(255,255,255,.85);
  --txt2:rgba(255,255,255,.38);
  --txt3:rgba(255,255,255,.16);
}
html,body{height:100%;background:var(--bg);overflow:hidden;font-family:'Azeret Mono',monospace;cursor:none}
button,input,select{font-family:'Azeret Mono',monospace}

/* CUSTOM CURSOR */
#cursor{position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
#cursor-ring{width:28px;height:28px;border:1px solid rgba(0,220,200,.5);border-radius:50%;transition:transform .08s,border-color .15s}
#cursor-dot{width:4px;height:4px;background:var(--accent);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px var(--accent)}
body.painting #cursor-ring{transform:scale(1.4);border-color:rgba(0,220,200,.8)}

/* LAYOUT */
#canvas-wrap{position:fixed;inset:0;z-index:0}
#fluid-canvas{display:block;width:100%;height:100%;cursor:none}
#overlay-canvas{position:absolute;inset:0;pointer-events:none}

/* SIDEBAR */
#sidebar{position:fixed;right:0;top:0;bottom:0;width:240px;z-index:100;
  background:rgba(3,9,14,.92);
  border-left:1px solid var(--border);
  backdrop-filter:blur(12px);
  display:flex;flex-direction:column;
  transition:transform .3s cubic-bezier(.4,0,.2,1)}
#sidebar.hidden{transform:translateX(220px)}

/* TOGGLE */
#sidebar-toggle{position:fixed;right:240px;top:50%;transform:translateY(-50%) translateX(100%);
  z-index:101;width:20px;height:56px;background:rgba(3,9,14,.9);
  border:1px solid var(--border);border-right:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:right .3s;color:var(--accent2);font-size:10px;
  writing-mode:vertical-rl;letter-spacing:3px;font-size:9px}
#sidebar.hidden ~ #sidebar-toggle{right:0}

/* SIDEBAR HEADER */
.sb-head{padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-title{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;letter-spacing:4px;
  color:var(--accent);text-shadow:0 0 20px rgba(0,220,200,.5);line-height:1}
.sb-sub{font-size:8px;letter-spacing:3px;color:var(--txt2);margin-top:3px}
.fps-badge{float:right;font-family:'Syne',monospace;font-size:11px;font-weight:700;
  color:var(--hi);text-shadow:0 0 10px rgba(160,255,238,.4)}

/* CONTROLS */
.sb-body{flex:1;overflow-y:auto;padding:10px 0;scrollbar-width:none}
.sb-body::-webkit-scrollbar{display:none}
.ctrl-group{padding:0 14px 12px;border-bottom:1px solid var(--border)}
.cg-label{font-size:8px;letter-spacing:4px;color:var(--txt2);padding:10px 0 8px;display:block}
.ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ctrl-name{font-size:10px;color:var(--txt2);flex:1;letter-spacing:1px}
.ctrl-val{font-size:10px;color:var(--accent);min-width:38px;text-align:right;font-weight:400}

/* SLIDERS */
input[type=range]{-webkit-appearance:none;height:2px;outline:none;flex:1;
  background:linear-gradient(90deg,var(--accent) var(--pct,50%),rgba(255,255,255,.1) var(--pct,50%));
  border-radius:1px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:var(--hi);box-shadow:0 0 8px rgba(160,255,238,.6);cursor:pointer;
  border:2px solid rgba(0,220,200,.4)}

/* MODE BUTTONS */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.mode-btn{padding:6px;background:transparent;border:1px solid rgba(0,220,200,.2);
  color:var(--txt2);font-size:9px;letter-spacing:2px;cursor:pointer;transition:all .12s;text-align:center}
.mode-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.mode-btn.active{background:rgba(0,220,200,.1);border-color:var(--accent);color:var(--accent)}

/* PALETTE SWATCHES */
.palette-row{display:flex;gap:4px;flex-wrap:wrap}
.pal-swatch{width:30px;height:20px;cursor:pointer;border:2px solid transparent;transition:all .12s;border-radius:1px}
.pal-swatch.active{border-color:var(--accent);transform:scale(1.1)}
.pal-swatch:hover{transform:scale(1.05)}

/* ACTION BUTTONS */
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.act-btn{padding:7px;background:transparent;border:1px solid rgba(0,220,200,.2);
  color:var(--txt2);font-size:9px;letter-spacing:2px;cursor:pointer;transition:all .15s}
.act-btn:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px rgba(0,220,200,.2)}
.act-btn.danger:hover{border-color:#ff4466;color:#ff4466;box-shadow:0 0 12px rgba(255,68,102,.2)}

/* HUD overlays */
#hud{position:fixed;left:16px;bottom:16px;z-index:50;pointer-events:none}
.hud-item{font-size:9px;letter-spacing:2px;color:rgba(0,220,200,.35);line-height:2;display:block}
.hud-item b{color:rgba(0,220,200,.6)}

#mode-hud{position:fixed;left:16px;top:16px;z-index:50;pointer-events:none;
  font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:6px;
  color:rgba(0,220,200,.25);text-transform:uppercase}
</style>
</head>
<body>

<div id="cursor"><div id="cursor-ring"></div><div id="cursor-dot"></div></div>

<div id="canvas-wrap">
  <canvas id="fluid-canvas"></canvas>
  <canvas id="overlay-canvas"></canvas>
</div>

<div id="hud">
  <span class="hud-item">DRAG · paint velocity + dye</span>
  <span class="hud-item">SCROLL · brush size</span>
  <span class="hud-item">SPACE · vortex burst</span>
</div>
<div id="mode-hud">DYE</div>

<div id="sidebar">
  <div class="sb-head">
    <div class="sb-title">FLUID SIM <span class="fps-badge" id="fps">60</span></div>
    <div class="sb-sub">NAVIER–STOKES · 2D STABLE FLUIDS</div>
  </div>
  <div class="sb-body">

    <div class="ctrl-group">
      <span class="cg-label">VISUALIZATION</span>
      <div class="mode-grid">
        <button class="mode-btn active" onclick="setVizMode('dye')" id="m-dye">DYE</button>
        <button class="mode-btn" onclick="setVizMode('velocity')" id="m-velocity">VELOCITY</button>
        <button class="mode-btn" onclick="setVizMode('vorticity')" id="m-vorticity">VORTICITY</button>
        <button class="mode-btn" onclick="setVizMode('pressure')" id="m-pressure">PRESSURE</button>
      </div>
    </div>

    <div class="ctrl-group">
      <span class="cg-label">COLOR PALETTE</span>
      <div class="palette-row" id="palette-row"></div>
    </div>

    <div class="ctrl-group">
      <span class="cg-label">FLUID PHYSICS</span>
      <div class="ctrl-row">
        <span class="ctrl-name">VISCOSITY</span>
        <input type="range" id="s-visc" min="0" max="100" value="2" oninput="updateParam(this,'visc',0,0.0002)">
        <span class="ctrl-val" id="v-visc">0.000</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-name">DIFFUSION</span>
        <input type="range" id="s-diff" min="0" max="100" value="0" oninput="updateParam(this,'diff',0,0.0001)">
        <span class="ctrl-val" id="v-diff">0.000</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-name">DISSIPATION</span>
        <input type="range" id="s-diss" min="800" max="1000" value="990" oninput="updateParam(this,'diss',0.8,1)">
        <span class="ctrl-val" id="v-diss">0.990</span>
      </div>
    </div>

    <div class="ctrl-group">
      <span class="cg-label">BRUSH</span>
      <div class="ctrl-row">
        <span class="ctrl-name">SIZE</span>
        <input type="range" id="s-brush" min="2" max="40" value="12" oninput="updateBrush(this)">
        <span class="ctrl-val" id="v-brush">12</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-name">FORCE</span>
        <input type="range" id="s-force" min="10" max="500" value="120" oninput="updateParam(this,'force',10,500)">
        <span class="ctrl-val" id="v-force">120</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-name">DYE AMOUNT</span>
        <input type="range" id="s-dye" min="1" max="100" value="60" oninput="updateParam(this,'dyeAmt',1,100)">
        <span class="ctrl-val" id="v-dye">60</span>
      </div>
    </div>

    <div class="ctrl-group">
      <span class="cg-label">VORTICITY CONFINEMENT</span>
      <div class="ctrl-row">
        <span class="ctrl-name">STRENGTH</span>
        <input type="range" id="s-vort" min="0" max="100" value="18" oninput="updateParam(this,'vortStr',0,50)">
        <span class="ctrl-val" id="v-vort">9</span>
      </div>
    </div>

    <div class="ctrl-group">
      <span class="cg-label">ACTIONS</span>
      <div class="action-grid">
        <button class="act-btn" onclick="vortexBurst()">⊕ VORTEX</button>
        <button class="act-btn" onclick="turbulence()">∿ TURBULENCE</button>
        <button class="act-btn" onclick="dyeRainbow()">◈ RAINBOW</button>
        <button class="act-btn danger" onclick="resetFluid()">✕ RESET</button>
      </div>
    </div>

  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  FLUID DYNAMICS SIMULATOR
//  Jos Stam "Stable Fluids" (1999) — real Navier-Stokes on a grid
//  Full incompressible 2D flow with vorticity confinement
// ══════════════════════════════════════════════════════════════════

// ── GRID ─────────────────────────────────────────────────────────
const N = 160;          // grid resolution
const SZ = (N+2)*(N+2); // total cells including ghost border
const IDX = (x,y) => (x) + (N+2)*(y);

// Field arrays (Float32 for perf)
let vx = new Float32Array(SZ), vy = new Float32Array(SZ);
let vx0= new Float32Array(SZ), vy0= new Float32Array(SZ);
let dye= new Float32Array(SZ), dye0=new Float32Array(SZ);
let dyeR=new Float32Array(SZ),dyeG=new Float32Array(SZ),dyeB=new Float32Array(SZ);
let dyeR0=new Float32Array(SZ),dyeG0=new Float32Array(SZ),dyeB0=new Float32Array(SZ);
let p   = new Float32Array(SZ), div = new Float32Array(SZ);
let curl= new Float32Array(SZ);

// ── PARAMS ───────────────────────────────────────────────────────
const params = {
  visc:0.000002, diff:0, diss:0.990,
  force:120, dyeAmt:60, vortStr:9,
  brushSize:12, dt:0.15
};

// ── BOUNDARY CONDITIONS ───────────────────────────────────────────
function setBnd(b, x) {
  for (let i = 1; i <= N; i++) {
    x[IDX(0,i)]   = b===1 ? -x[IDX(1,i)] : x[IDX(1,i)];
    x[IDX(N+1,i)] = b===1 ? -x[IDX(N,i)] : x[IDX(N,i)];
    x[IDX(i,0)]   = b===2 ? -x[IDX(i,1)] : x[IDX(i,1)];
    x[IDX(i,N+1)] = b===2 ? -x[IDX(i,N)] : x[IDX(i,N)];
  }
  x[IDX(0,0)]     = 0.5*(x[IDX(1,0)]   + x[IDX(0,1)]);
  x[IDX(0,N+1)]   = 0.5*(x[IDX(1,N+1)] + x[IDX(0,N)]);
  x[IDX(N+1,0)]   = 0.5*(x[IDX(N,0)]   + x[IDX(N+1,1)]);
  x[IDX(N+1,N+1)] = 0.5*(x[IDX(N,N+1)] + x[IDX(N+1,N)]);
}

// ── LINEAR SOLVE (Gauss-Seidel) ───────────────────────────────────
function linSolve(b, x, x0, a, c, iter=16) {
  const cRecip = 1.0/c;
  for (let k = 0; k < iter; k++) {
    for (let j = 1; j <= N; j++) {
      for (let i = 1; i <= N; i++) {
        x[IDX(i,j)] = (x0[IDX(i,j)] + a*(
          x[IDX(i-1,j)] + x[IDX(i+1,j)] +
          x[IDX(i,j-1)] + x[IDX(i,j+1)]
        )) * cRecip;
      }
    }
    setBnd(b, x);
  }
}

// ── DIFFUSE ───────────────────────────────────────────────────────
function diffuse(b, x, x0, diff, dt) {
  const a = dt * diff * N * N;
  linSolve(b, x, x0, a, 1 + 4*a);
}

// ── PROJECT (Helmholtz decomposition — incompressibility) ─────────
function project(vx, vy, p, div) {
  for (let j = 1; j <= N; j++) {
    for (let i = 1; i <= N; i++) {
      div[IDX(i,j)] = -0.5*(
        vx[IDX(i+1,j)] - vx[IDX(i-1,j)] +
        vy[IDX(i,j+1)] - vy[IDX(i,j-1)]
      ) / N;
      p[IDX(i,j)] = 0;
    }
  }
  setBnd(0, div); setBnd(0, p);
  linSolve(0, p, div, 1, 4, 20);
  for (let j = 1; j <= N; j++) {
    for (let i = 1; i <= N; i++) {
      vx[IDX(i,j)] -= 0.5*N*(p[IDX(i+1,j)] - p[IDX(i-1,j)]);
      vy[IDX(i,j)] -= 0.5*N*(p[IDX(i,j+1)] - p[IDX(i,j-1)]);
    }
  }
  setBnd(1, vx); setBnd(2, vy);
}

// ── ADVECT (semi-Lagrangian) ───────────────────────────────────────
function advect(b, d, d0, vx, vy, dt) {
  const dtx = dt*N, dty = dt*N;
  for (let j = 1; j <= N; j++) {
    for (let i = 1; i <= N; i++) {
      let x = i - dtx*vx[IDX(i,j)];
      let y = j - dty*vy[IDX(i,j)];
      x = Math.max(0.5, Math.min(N+0.5, x));
      y = Math.max(0.5, Math.min(N+0.5, y));
      const i0 = x|0, i1 = i0+1;
      const j0 = y|0, j1 = j0+1;
      const s1 = x-i0, s0 = 1-s1;
      const t1 = y-j0, t0 = 1-t1;
      d[IDX(i,j)] = s0*(t0*d0[IDX(i0,j0)] + t1*d0[IDX(i0,j1)])
                  + s1*(t0*d0[IDX(i1,j0)] + t1*d0[IDX(i1,j1)]);
    }
  }
  setBnd(b, d);
}

// ── VORTICITY CONFINEMENT ─────────────────────────────────────────
function applyVorticity() {
  const eps = params.vortStr;
  if (eps <= 0) return;
  // Compute curl
  for (let j = 1; j <= N; j++) {
    for (let i = 1; i <= N; i++) {
      curl[IDX(i,j)] = (vy[IDX(i+1,j)] - vy[IDX(i-1,j)] -
                        vx[IDX(i,j+1)] + vx[IDX(i,j-1)]) * 0.5;
    }
  }
  // Apply confinement force
  for (let j = 2; j < N; j++) {
    for (let i = 2; i < N; i++) {
      const dCdx = (Math.abs(curl[IDX(i+1,j)]) - Math.abs(curl[IDX(i-1,j)])) * 0.5;
      const dCdy = (Math.abs(curl[IDX(i,j+1)]) - Math.abs(curl[IDX(i,j-1)])) * 0.5;
      const len  = Math.sqrt(dCdx*dCdx + dCdy*dCdy) + 1e-10;
      const nx = dCdx/len, ny = dCdy/len;
      vx[IDX(i,j)] += eps * params.dt * ny * curl[IDX(i,j)];
      vy[IDX(i,j)] -= eps * params.dt * nx * curl[IDX(i,j)];
    }
  }
}

// ── VELOCITY STEP ─────────────────────────────────────────────────
function velStep() {
  const dt = params.dt;
  [vx,vx0]=[vx0,vx]; diffuse(1,vx,vx0,params.visc,dt);
  [vy,vy0]=[vy0,vy]; diffuse(2,vy,vy0,params.visc,dt);
  project(vx,vy,p,div);
  [vx,vx0]=[vx0,vx]; [vy,vy0]=[vy0,vy];
  advect(1,vx,vx0,vx0,vy0,dt);
  advect(2,vy,vy0,vx0,vy0,dt);
  project(vx,vy,p,div);
  applyVorticity();
}

// ── DYE STEP ─────────────────────────────────────────────────────
function dyeStep() {
  const dt = params.dt, d = params.diss;
  [dyeR,dyeR0]=[dyeR0,dyeR]; diffuse(0,dyeR,dyeR0,params.diff,dt); advect(0,dyeR,dyeR0,vx,vy,dt);
  [dyeG,dyeG0]=[dyeG0,dyeG]; diffuse(0,dyeG,dyeG0,params.diff,dt); advect(0,dyeG,dyeG0,vx,vy,dt);
  [dyeB,dyeB0]=[dyeB0,dyeB]; diffuse(0,dyeB,dyeB0,params.diff,dt); advect(0,dyeB,dyeB0,vx,vy,dt);
  for (let i=0;i<SZ;i++) { dyeR[i]*=d; dyeG[i]*=d; dyeB[i]*=d; }
}

// ── ADD FORCES / DYE FROM MOUSE ───────────────────────────────────
function addForce(gx, gy, dvx, dvy, dr, dg, db) {
  const r = params.brushSize;
  const force = params.force;
  const dye   = params.dyeAmt * 0.012;
  for (let j = Math.max(1, gy-r); j <= Math.min(N, gy+r); j++) {
    for (let i = Math.max(1, gx-r); i <= Math.min(N, gx+r); i++) {
      const dx = i-gx, dy = j-gy;
      const w = Math.exp(-(dx*dx+dy*dy)/(r*r*0.5));
      vx[IDX(i,j)] += force * dvx * w;
      vy[IDX(i,j)] += force * dvy * w;
      dyeR[IDX(i,j)] += dye * dr * w;
      dyeG[IDX(i,j)] += dye * dg * w;
      dyeB[IDX(i,j)] += dye * db * w;
    }
  }
}

// ── COLOR PALETTES ────────────────────────────────────────────────
const PALETTES = {
  biolum: {
    name:'OCEAN',
    map: v => {
      v = Math.min(1, v);
      const r = Math.min(255, v*v*200);
      const g = Math.min(255, v*180 + v*v*60);
      const b = Math.min(255, v*255);
      return [r,g,b];
    },
    preview: ['#001020','#004060','#00a0a0','#00e8d0','#a0fff0']
  },
  plasma: {
    name:'PLASMA',
    map: v => {
      v = Math.min(1,v);
      const r = Math.min(255, v < .5 ? v*2*120 : 120+(v-.5)*2*135);
      const g = Math.min(255, v < .33 ? 0 : (v-.33)*1.5*200);
      const b = Math.min(255, v < .5 ? 200-v*300 : 0);
      return [r,g,b];
    },
    preview: ['#050010','#300060','#780080','#d04000','#ffec40']
  },
  inferno: {
    name:'INFERNO',
    map: v => {
      v = Math.min(1,v);
      const r = Math.min(255, v < .5 ? v*2*200 : 200+(v-.5)*2*55);
      const g = Math.min(255, v*v*220);
      const b = Math.min(255, v < .25 ? v*4*100 : Math.max(0,100-(v-.25)*4*100));
      return [r,g,b];
    },
    preview: ['#000004','#300060','#900020','#e04000','#fdf040']
  },
  frost: {
    name:'FROST',
    map: v => {
      v = Math.min(1,v);
      const r = Math.min(255, v*180);
      const g = Math.min(255, v*220 + v*v*35);
      const b = 255;
      return [r,g,b];
    },
    preview: ['#000820','#002040','#004080','#60b0ff','#e0f4ff']
  },
  ember: {
    name:'EMBER',
    map: v => {
      v = Math.min(1,v);
      const r = Math.min(255, v > .3 ? 255 : v/.3*255);
      const g = Math.min(255, v > .5 ? (v-.5)*2*255 : 0);
      const b = Math.min(255, v > .75 ? (v-.75)*4*255 : 0);
      return [r,g,b];
    },
    preview: ['#080000','#280000','#800010','#ff6000','#fff8e0']
  },
  void: {
    name:'VOID',
    map: v => {
      v = Math.min(1,v);
      const r = Math.min(255, v < .6 ? 0 : (v-.6)*2.5*255);
      const g = Math.min(255, v*v*v*255);
      const b = Math.min(255, v*v*200 + v*v*v*55);
      return [r,g,b];
    },
    preview: ['#000000','#000010','#100030','#300060','#c060ff']
  }
};

let activePalette = 'biolum';

// ── BUILD PALETTE UI ──────────────────────────────────────────────
function buildPaletteUI() {
  const row = document.getElementById('palette-row');
  Object.entries(PALETTES).forEach(([key, pal]) => {
    const el = document.createElement('div');
    el.className = 'pal-swatch' + (key===activePalette?' active':'');
    el.title = pal.name;
    el.style.background = `linear-gradient(90deg,${pal.preview.join(',')})`;
    el.onclick = () => {
      activePalette = key;
      document.querySelectorAll('.pal-swatch').forEach((s,i) => {
        s.className = 'pal-swatch' + (Object.keys(PALETTES)[i]===key?' active':'');
      });
    };
    row.appendChild(el);
  });
}

// ── VISUALIZATION MODES ───────────────────────────────────────────
let vizMode = 'dye';
function setVizMode(m) {
  vizMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('m-'+m).classList.add('active');
  document.getElementById('mode-hud').textContent = m.toUpperCase();
}

// ── CANVAS RENDERING ──────────────────────────────────────────────
const canvas = document.getElementById('fluid-canvas');
const ctx = canvas.getContext('2d', {willReadFrequently: false});
let imgData, pixels;

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  imgData = ctx.createImageData(canvas.width, canvas.height);
  pixels  = imgData.data;
}

function renderFluid() {
  const W = canvas.width, H = canvas.height;
  if (!pixels) return;
  const pal = PALETTES[activePalette].map;
  const scaleX = N / W, scaleY = N / H;

  for (let py = 0; py < H; py++) {
    for (let px = 0; px < W; px++) {
      const gx = Math.max(1, Math.min(N, (px*scaleX+1)|0));
      const gy = Math.max(1, Math.min(N, (py*scaleY+1)|0));
      const idx = IDX(gx, gy);
      const pi  = (py*W + px) * 4;
      let r,g,b;

      if (vizMode === 'dye') {
        r = Math.min(255, dyeR[idx] * 255);
        g = Math.min(255, dyeG[idx] * 255);
        b = Math.min(255, dyeB[idx] * 255);
      } else if (vizMode === 'velocity') {
        const vxv = vx[idx], vyv = vy[idx];
        const spd = Math.sqrt(vxv*vxv + vyv*vyv) * 0.8;
        const [cr,cg,cb] = pal(spd);
        r=cr; g=cg; b=cb;
      } else if (vizMode === 'vorticity') {
        const c = curl[idx] * 0.06;
        const cv = Math.min(1, Math.abs(c));
        if (c > 0) { r=0; g=Math.min(255,cv*255); b=Math.min(255,cv*200); }
        else       { r=Math.min(255,cv*255); g=0; b=Math.min(255,cv*180); }
      } else { // pressure
        const pv = (p[idx] + 0.5) * 0.5;
        const [cr,cg,cb] = pal(Math.min(1,Math.max(0,pv)));
        r=cr; g=cg; b=cb;
      }

      pixels[pi]   = r;
      pixels[pi+1] = g;
      pixels[pi+2] = b;
      pixels[pi+3] = 255;
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

// ── MOUSE INTERACTION ─────────────────────────────────────────────
let mouse = {x:0, y:0, px:0, py:0, down:false};
let dyeHue = 0;

function canvasToGrid(cx, cy) {
  return {
    gx: Math.max(1, Math.min(N, ((cx / canvas.width ) * N)|0)),
    gy: Math.max(1, Math.min(N, ((cy / canvas.height) * N)|0))
  };
}

function hsv(h,s,v) {
  const c=v*s, x=c*(1-Math.abs((h/60)%2-1)), m=v-c;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x}else if(h<120){r=x;g=c}else if(h<180){g=c;b=x}
  else if(h<240){g=x;b=c}else if(h<300){r=x;b=c}else{r=c;b=x}
  return [r+m,g+m,b+m];
}

canvas.addEventListener('mousedown', e => {
  mouse.down=true;
  mouse.px=e.clientX; mouse.py=e.clientY;
  document.body.classList.add('painting');
});
canvas.addEventListener('mousemove', e => {
  mouse.x=e.clientX; mouse.y=e.clientY;
  const cursor = document.getElementById('cursor');
  cursor.style.left = e.clientX+'px';
  cursor.style.top  = e.clientY+'px';

  if (!mouse.down) return;
  const dvx = (e.clientX - mouse.px) / canvas.width  * N;
  const dvy = (e.clientY - mouse.py) / canvas.height * N;
  const {gx,gy} = canvasToGrid(e.clientX, e.clientY);
  dyeHue = (dyeHue + 1.2) % 360;
  const [dr,dg,db] = hsv(dyeHue, 0.9, 1.0);
  addForce(gx, gy, dvx, dvy, dr, dg, db);
  mouse.px=e.clientX; mouse.py=e.clientY;
});
window.addEventListener('mouseup', () => {
  mouse.down=false;
  document.body.classList.remove('painting');
});
window.addEventListener('mousemove', e => {
  const cursor = document.getElementById('cursor');
  cursor.style.left = e.clientX+'px';
  cursor.style.top  = e.clientY+'px';
});

// Scroll = brush size
canvas.addEventListener('wheel', e => {
  params.brushSize = Math.max(2, Math.min(40, params.brushSize - (e.deltaY>0?1:-1)*2));
  document.getElementById('s-brush').value = params.brushSize;
  document.getElementById('v-brush').textContent = params.brushSize;
  e.preventDefault();
}, {passive:false});

// Space = vortex burst
window.addEventListener('keydown', e => {
  if (e.code==='Space') { e.preventDefault(); vortexBurst(); }
});

// ── ACTIONS ───────────────────────────────────────────────────────
function vortexBurst() {
  const cx = N/2 + (Math.random()-.5)*N*.3|0;
  const cy = N/2 + (Math.random()-.5)*N*.3|0;
  const R = 20 + Math.random()*15;
  const strength = 80 + Math.random()*80;
  const [dr,dg,db] = hsv(Math.random()*360, 0.85, 1.0);
  for (let j=Math.max(1,cy-R|0); j<=Math.min(N,cy+R|0); j++) {
    for (let i=Math.max(1,cx-R|0); i<=Math.min(N,cx+R|0); i++) {
      const dx=i-cx, dy=j-cy, r=Math.sqrt(dx*dx+dy*dy)+0.01;
      if (r > R) continue;
      const w = Math.exp(-r*r/(R*R*0.6)) * strength;
      vx[IDX(i,j)] += w*(-dy/r);
      vy[IDX(i,j)] += w*(dx/r);
      const dye = w * 0.018;
      dyeR[IDX(i,j)] += dye*dr;
      dyeG[IDX(i,j)] += dye*dg;
      dyeB[IDX(i,j)] += dye*db;
    }
  }
}

function turbulence() {
  for (let k=0; k<30; k++) {
    const gx = 2 + Math.random()*(N-3)|0;
    const gy = 2 + Math.random()*(N-3)|0;
    const a  = Math.random()*Math.PI*2;
    const f  = 30 + Math.random()*100;
    const [dr,dg,db] = hsv(Math.random()*360, 0.8, 1.0);
    addForce(gx,gy, Math.cos(a)*f/params.force, Math.sin(a)*f/params.force, dr, dg, db);
  }
}

function dyeRainbow() {
  const steps = 12;
  for (let k=0; k<steps; k++) {
    const x = N/2 + Math.cos(k/steps*Math.PI*2)*(N*.3)|0;
    const y = N/2 + Math.sin(k/steps*Math.PI*2)*(N*.3)|0;
    const [dr,dg,db] = hsv(k/steps*360, 1, 1);
    addForce(x, y, 0, 0, dr, dg, db);
  }
}

function resetFluid() {
  vx.fill(0);vy.fill(0);vx0.fill(0);vy0.fill(0);
  dyeR.fill(0);dyeG.fill(0);dyeB.fill(0);
  dyeR0.fill(0);dyeG0.fill(0);dyeB0.fill(0);
  p.fill(0);div.fill(0);curl.fill(0);
}

// ── PARAM CONTROLS ────────────────────────────────────────────────
function updateParam(el, key, min, max) {
  const v = min + (max-min) * (el.value - parseFloat(el.min)) / (parseFloat(el.max)-parseFloat(el.min));
  params[key] = v;
  const valEl = el.id.replace('s-','v-');
  document.getElementById(valEl).textContent = v.toFixed(v < 0.01 ? 5 : v < 10 ? 3 : 0);
  const pct = (el.value-parseFloat(el.min))/(parseFloat(el.max)-parseFloat(el.min))*100;
  el.style.setProperty('--pct', pct+'%');
}

function updateBrush(el) {
  params.brushSize = parseInt(el.value);
  document.getElementById('v-brush').textContent = el.value;
  const pct = (el.value-2)/(40-2)*100;
  el.style.setProperty('--pct', pct+'%');
  const ring = document.getElementById('cursor-ring');
  const sz = 14 + parseInt(el.value)*1.2;
  ring.style.width = sz+'px'; ring.style.height = sz+'px';
}

// Init slider visual state
function initSliders() {
  document.querySelectorAll('input[type=range]').forEach(el => {
    const pct = (el.value-parseFloat(el.min))/(parseFloat(el.max)-parseFloat(el.min))*100;
    el.style.setProperty('--pct', pct+'%');
  });
}

// ── FPS ───────────────────────────────────────────────────────────
let frameCount=0, lastFPSTime=performance.now();
function updateFPS() {
  frameCount++;
  const now = performance.now();
  if (now-lastFPSTime > 500) {
    const fps = Math.round(frameCount*1000/(now-lastFPSTime));
    document.getElementById('fps').textContent = fps;
    frameCount=0; lastFPSTime=now;
  }
}

// ── MAIN LOOP ─────────────────────────────────────────────────────
function loop() {
  velStep();
  dyeStep();
  renderFluid();
  updateFPS();
  requestAnimationFrame(loop);
}

// ── INIT ──────────────────────────────────────────────────────────
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
buildPaletteUI();
initSliders();

// Seed with a beautiful initial state
setTimeout(() => {
  vortexBurst(); vortexBurst(); vortexBurst();
  dyeRainbow();
  setTimeout(() => { vortexBurst(); turbulence(); }, 400);
}, 100);

loop();
</script>
