<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICE9L // WAVE PROPAGATION ENGINE</title>
<style>
:root{
  --neon:#00ff88;
  --cyan:#00e5ff;
  --mag:#ff4088;
  --bg:#000;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#000;color:var(--neon);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;overflow:hidden;cursor:crosshair}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(0,255,136,0.06) 0%, transparent 60%),radial-gradient(ellipse at center,rgba(0,229,255,0.04) 0%, transparent 70%);pointer-events:none;z-index:1}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,0.08) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.08) 1px,transparent 1px);background-size:48px 48px;opacity:.18;pointer-events:none;z-index:1;animation:gridShift 20s linear infinite}
@keyframes gridShift{0%{transform:translate(0,0)}100%{transform:translate(48px,48px)}}
.crt{position:fixed;inset:0;pointer-events:none;z-index:5;background:repeating-linear-gradient(0deg,rgba(0,0,0,.25) 0px,rgba(0,0,0,.25) 2px,transparent 2px,transparent 4px),radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.85) 100%);mix-blend-mode:screen;opacity:.55}

header{position:absolute;top:22px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;pointer-events:none;width:92%}
h1{font-size:clamp(16px,2.6vw,26px);letter-spacing:.22em;font-weight:700;text-transform:uppercase;text-shadow:0 0 10px var(--neon),0 0 30px rgba(0,255,136,.5),0 0 60px rgba(0,255,136,.3);animation:flicker 7s infinite}
.subtitle{margin-top:8px;font-size:clamp(10px,1.3vw,13px);color:var(--cyan);letter-spacing:.18em;opacity:.85;text-shadow:0 0 8px var(--cyan);animation:flicker 9s infinite}
@keyframes flicker{0%,19%,21%,23%,25%,54%,56%,100%{opacity:.95}20%,24%,55%{opacity:.6}}

canvas{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:2}

.panel{position:absolute;z-index:10;background:linear-gradient(180deg,rgba(0,12,8,.85),rgba(0,6,4,.7));border:1px solid rgba(0,255,136,.22);border-radius:14px;padding:18px 20px;backdrop-filter:blur(12px);box-shadow:0 0 24px rgba(0,255,136,.08),inset 0 0 24px rgba(0,255,136,.03),inset 0 1px 0 rgba(0,255,136,.15)}
.panel::before{content:'';position:absolute;inset:-1px;border-radius:14px;padding:1px;background:linear-gradient(180deg,rgba(0,255,136,.4),transparent,rgba(0,229,255,.3));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.5;pointer-events:none}
.panel.left{left:24px;top:50%;transform:translateY(-50%);width:190px}
.panel.right{right:24px;top:50%;transform:translateY(-50%);width:130px}

.metric{margin-bottom:20px}
.metric:last-child{margin-bottom:0}
.label{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--cyan);opacity:.7;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.label::before{content:'>';color:var(--neon);text-shadow:0 0 6px var(--neon)}
.value{font-size:30px;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:.02em;text-shadow:0 0 14px currentColor;transition:all .2s}
.value.pos{color:var(--cyan);text-shadow:0 0 14px var(--cyan)}
.value.neg{color:var(--mag);text-shadow:0 0 14px var(--mag)}
.value.zero{color:var(--neon)}

.stack-wrap{display:flex;align-items:end;gap:10px}
.stack-bars{display:flex;gap:4px;align-items:flex-end;height:34px;flex:1}
.bar{flex:1;height:5px;background:rgba(0,255,136,.12);border-radius:2px;transition:all .4s cubic-bezier(.2,1,.3,1);box-shadow:inset 0 0 4px rgba(0,0,0,.8)}
.bar.active{height:30px;background:var(--neon);box-shadow:0 0 12px var(--neon),0 0 24px rgba(0,255,136,.5),inset 0 0 6px rgba(255,255,255,.3)}
#stackTxt{min-width:34px;text-align:right;font-size:13px;opacity:.8;color:var(--cyan);text-shadow:0 0 8px var(--cyan)}

.x3-mod{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(0,255,136,.08);position:relative}
.x3-mod:last-child{border-bottom:none}
.x3-label{font-size:24px;font-weight:700;letter-spacing:.12em;text-shadow:0 0 12px var(--neon)}
.x3-mod::after{content:'';position:absolute;left:-20px;right:-20px;top:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(0,255,136,.05),transparent);opacity:0;transition:.3s;pointer-events:none}
.x3-mod.active::after{opacity:1}
.x3-dot{width:12px;height:12px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan),0 0 20px var(--cyan),inset 0 0 4px rgba(255,255,255,.8);animation:pulse 2.2s infinite;transition:transform .18s}
.x3-mod:nth-child(2) .x3-dot{animation-delay:.2s;background:var(--neon);box-shadow:0 0 10px var(--neon),0 0 20px var(--neon),inset 0 0 4px rgba(255,255,255,.8)}
.x3-mod:nth-child(3) .x3-dot{animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.35;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}

footer{position:absolute;bottom:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:linear-gradient(to top,rgba(0,0,0,.95),rgba(0,0,0,.6) 40%,transparent);border-top:1px solid rgba(0,255,136,.15);font-size:11px;letter-spacing:.16em;text-transform:uppercase}
.modes{display:flex;gap:16px;align-items:center;opacity:.9}
.modes span{color:var(--cyan);text-shadow:0 0 6px var(--cyan);position:relative}
.modes span::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;background:var(--cyan);box-shadow:0 0 6px var(--cyan);transform:scaleX(0);transition:.3s;transform-origin:left}
.modes span.active::after{transform:scaleX(1)}
.slash{opacity:.3}
.status{display:flex;align-items:center;gap:10px;color:var(--neon);text-shadow:0 0 8px var(--neon)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--neon);box-shadow:0 0 10px var(--neon),0 0 18px var(--neon);animation:blink 1.1s steps(2) infinite}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:.2}}

.corner{position:absolute;width:12px;height:12px;border-color:var(--neon);opacity:.5}
.corner.tl{top:8px;left:8px;border-top:1px solid;border-left:1px solid}
.corner.tr{top:8px;right:8px;border-top:1px solid;border-right:1px solid}
.corner.bl{bottom:8px;left:8px;border-bottom:1px solid;border-left:1px solid}
.corner.br{bottom:8px;right:8px;border-bottom:1px solid;border-right:1px solid}

.hint{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);z-index:9;font-size:10px;letter-spacing:.2em;opacity:.4;color:var(--cyan);text-transform:uppercase;pointer-events:none;animation:hintFade 4s ease-in-out infinite}
@keyframes hintFade{0%,100%{opacity:.25}50%{opacity:.55}}

@media(max-width:860px){
  .panel.left{left:12px;transform:translateY(-50%) scale(.9);transform-origin:left center}
  .panel.right{right:12px;transform:translateY(-50%) scale(.9);transform-origin:right center}
  footer{padding:12px 14px;font-size:10px}
  .modes{gap:10px}
  .hint{display:none}
}
@media(max-width:560px){
  header{top:14px}
  .panel.left{top:auto;bottom:80px;transform:none;width:160px;padding:14px}
  .panel.right{top:auto;bottom:80px;transform:none;width:110px;padding:14px}
  .value{font-size:24px}
}
</style>
</head>
<body>
<div class="grid"></div>
<div class="crt"></div>
<canvas id="wave"></canvas>

<header>
  <h1>ICE9L // WAVE PROPAGATION</h1>
  <div class="subtitle">8.01 → 8.99 → 8.01 | x3 x3 x3 | standing up</div>
</header>

<aside class="panel left">
  <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
  <div class="metric">
    <div class="label">Position</div>
    <div id="pos" class="value">8.50</div>
  </div>
  <div class="metric">
    <div class="label">Phase</div>
    <div id="phase" class="value zero">0</div>
  </div>
  <div class="metric">
    <div class="label">Stack</div>
    <div class="stack-wrap">
      <div class="stack-bars">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
      <div id="stackTxt">3/6</div>
    </div>
  </div>
</aside>

<aside class="panel right">
  <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
  <div class="x3-mod"><div class="x3-label">x3</div><div class="x3-dot"></div></div>
  <div class="x3-mod"><div class="x3-label">x3</div><div class="x3-dot"></div></div>
  <div class="x3-mod"><div class="x3-label">x3</div><div class="x3-dot"></div></div>
</aside>

<div class="hint">click / tap to inject energy</div>

<footer>
  <div class="modes">
    <span class="active">LINEAR</span><span class="slash">/</span>
    <span class="active">FRACTAL</span><span class="slash">/</span>
    <span class="active">INFINITE</span>
  </div>
  <div class="status"><div class="status-dot"></div>BLOOMING FOREVER</div>
</footer>

<script>
(() => {
  const canvas = document.getElementById('wave');
  const ctx = canvas.getContext('2d', { alpha: true });
  let w, h, dpr;
  const layers = 6;
  const layerData = [];
  for(let i=0;i<layers;i++) layerData.push({offset:i*Math.PI/2.7, lastPeak:0, lastTrough:0, hist:[]});
  
  let blooms = [];
  let mouseY = null, hoverLayer = -1, speedBoost = 1;
  
  const posEl = document.getElementById('pos');
  const phaseEl = document.getElementById('phase');
  const stackBars = [...document.querySelectorAll('.stack-bars .bar')];
  const stackTxt = document.getElementById('stackTxt');
  const xMods = [...document.querySelectorAll('.x3-mod')];
  const xDots = [...document.querySelectorAll('.x3-dot')];

  function resize(){
    dpr = Math.min(window.devicePixelRatio, 2);
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(1,0,0,1,0,0);
    ctx.scale(dpr, dpr);
  }
  window.addEventListener('resize', resize);
  resize();

  function spawnBloom(x, y, type, layer){
    blooms.push({x, y, type, layer, start: performance.now(), life: 1650 + Math.random()*200});
    stackBars.forEach((b,i)=> b.classList.toggle('active', i===layer));
    stackTxt.textContent = `${layer+1}/6`;
    xMods.forEach((m,i)=>{
      m.classList.add('active');
      setTimeout(()=>m.classList.remove('active'), 300 + i*80);
      const d = xDots[i];
      setTimeout(()=>{ d.style.transform='scale(1.8)'; setTimeout(()=>d.style.transform='',180); }, i*70);
    });
  }

  function drawFractal(x, y, prog, depth, angle, scale, color){
    if(depth===0 || prog<=0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - prog*0.65);
    ctx.shadowBlur = 16 * scale;
    ctx.shadowColor = color;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.4 * scale;
    for(let i=0;i<3;i++){
      const a = angle + i * 2.09439510239 + prog * 0.9;
      const len = 42 * scale * prog * (1.15 - depth*0.18);
      const x2 = x + Math.cos(a) * len;
      const y2 = y + Math.sin(a) * len;
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x2,y2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x2,y2,2.4*scale,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();
      drawFractal(x2, y2, prog, depth-1, a + 0.3, scale*0.63, color);
    }
    ctx.restore();
  }

  function animate(now){
    ctx.fillStyle = 'rgba(0,0,0,0.17)';
    ctx.fillRect(0,0,w,h);

    const left = w * 0.14;
    const right = w * 0.86;
    const midX = (left + right) / 2;
    const topY = h * 0.2;
    const bottomY = h * 0.82;
    const baseSpeed = 0.00052 * speedBoost;

    // center phase line
    ctx.save();
    ctx.shadowBlur = 30;
    ctx.shadowColor = '#00e5ff';
    ctx.strokeStyle = 'rgba(0,229,255,0.95)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4,12]);
    ctx.lineDashOffset = -now*0.02;
    ctx.beginPath(); ctx.moveTo(midX, topY-18); ctx.lineTo(midX, bottomY+18); ctx.stroke();
    ctx.setLineDash([]);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(0,229,255,0.9)';
    ctx.font = '11px ui-monospace,monospace';
    ctx.textAlign = 'center';
    ctx.fillText('8.50', midX, topY - 28);
    ctx.fillText('PHASE TRANSFER 0', midX, topY - 14);
    ctx.restore();

    // range labels
    ctx.save();
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#00ff88';
    ctx.font = '11px ui-monospace,monospace';
    ctx.textAlign = 'left';
    ctx.fillText('8.01', left, topY - 28);
    ctx.textAlign = 'right';
    ctx.fillText('8.99', right, topY - 28);
    ctx.restore();

    if(mouseY !== null){
      hoverLayer = Math.max(0, Math.min(layers-1, Math.round((mouseY/h - 0.22)/0.11)));
    }

    for(let i=0;i<layers;i++){
      const y = h * (0.22 + i*0.108);
      const t = now * baseSpeed + layerData[i].offset;
      const s = Math.sin(t);
      const c = Math.cos(t);
      const value = 8.5 + 0.49 * s;
      const x = left + (right - left) * ((value - 8.01) / 0.98);
      
      const hist = layerData[i].hist;
      hist.push({x, t:now});
      if(hist.length>140) hist.shift();

      const isHover = i === hoverLayer;
      
      // track
      ctx.save();
      ctx.globalAlpha = isHover ? 0.38 : 0.16;
      ctx.strokeStyle = '#00ff88';
      ctx.lineWidth = isHover ? 2.2 : 1;
      ctx.shadowBlur = isHover ? 14 : 0;
      ctx.shadowColor = '#00ff88';
      ctx.beginPath(); ctx.moveTo(left, y); ctx.lineTo(right, y); ctx.stroke();
      ctx.restore();

      // ticks
      for(let tx=0;tx<=4;tx++){
        const txp = left + (right-left)*(tx/4);
        ctx.fillStyle='rgba(0,255,136,0.13)';
        ctx.fillRect(txp-0.5, y-3, 1, 6);
      }

      // trail
      ctx.save();
      ctx.beginPath();
      for(let j=0;j<hist.length;j++){
        const p = hist[j];
        const a = j / hist.length;
        ctx.globalAlpha = a * 0.7;
        if(j===0) ctx.moveTo(p.x, y);
        else ctx.lineTo(p.x, y);
      }
      ctx.strokeStyle = '#00ff88';
      ctx.lineWidth = 2.5;
      ctx.shadowBlur = 18;
      ctx.shadowColor = '#00ff88';
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.restore();

      // wave head
      const col = s > 0 ? '#00e5ff' : '#00ff88';
      ctx.save();
      ctx.shadowBlur = 28;
      ctx.shadowColor = col;
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(x, y, isHover?7.2:5, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(0,0,0,0.85)';
      ctx.beginPath(); ctx.arc(x, y, 1.9, 0, Math.PI*2); ctx.fill();
      // direction chevron ======>
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = col;
      ctx.font = '13px ui-monospace';
      ctx.textAlign = 'center';
      ctx.fillText(c>0 ? '══════►' : '◄══════', x, y - 16);
      ctx.restore();

      // end labels
      ctx.save();
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = '#00ff88';
      ctx.font = '10px ui-monospace';
      ctx.textAlign = 'right';
      ctx.fillText(`STACK ${i+1}/6`, left-12, y+3);
      ctx.restore();

      // blooms
      if(s > 0.9965 && now - layerData[i].lastPeak > 900){
        layerData[i].lastPeak = now;
        spawnBloom(x, y, 'peak', i);
      }
      if(s < -0.9965 && now - layerData[i].lastTrough > 900){
        layerData[i].lastTrough = now;
        spawnBloom(x, y, 'trough', i);
      }
    }

    // draw blooms (standing up)
    blooms = blooms.filter(b => {
      const age = now - b.start;
      const prog = age / b.life;
      if(prog >= 1) return false;
      const color = b.type === 'peak' ? '#00e5ff' : '#00ff88';
      
      // core flash
      ctx.save();
      ctx.globalAlpha = (1 - prog) * 0.9;
      ctx.shadowBlur = 40;
      ctx.shadowColor = color;
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(b.x, b.y, 6 * (1 - prog*0.6), 0, Math.PI*2); ctx.fill();
      ctx.restore();

      // fractal bloom 3x3x3
      const p = Math.min(1, prog * 1.25);
      drawFractal(b.x, b.y, p, 3, b.layer * 0.7 + prog, 1, color);

      // vertical standing wave
      ctx.save();
      ctx.globalAlpha = 0.18 * (1-prog);
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.shadowBlur = 12;
      ctx.shadowColor = color;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y - 90 * p);
      ctx.lineTo(b.x, b.y + 90 * p);
      ctx.stroke();
      // standing nodes
      for(let n=-1;n<=1;n+=2){
        const ny = b.y + n * 55 * p;
        ctx.globalAlpha = 0.3*(1-prog);
        ctx.beginPath(); ctx.arc(b.x, ny, 3, 0, Math.PI*2); ctx.fillStyle=color; ctx.fill();
      }
      ctx.restore();

      return true;
    });

    // UI update
    if(Math.floor(now/70) % 3 === 0){
      const t2 = now*baseSpeed + layerData[2].offset;
      const v2 = 8.5 + 0.49 * Math.sin(t2);
      posEl.textContent = v2.toFixed(2);
      const ph = Math.cos(t2);
      const phase = ph > 0.13 ? '+1' : ph < -0.13 ? '-1' : '0';
      phaseEl.textContent = phase;
      phaseEl.className = 'value ' + (phase === '+1' ? 'pos' : phase === '-1' ? 'neg' : 'zero');
    }

    if(speedBoost > 1){ speedBoost *= 0.985; if(speedBoost < 1.02) speedBoost = 1; }

    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  canvas.addEventListener('pointermove', e => { mouseY = e.clientY; });
  canvas.addEventListener('pointerleave', () => { mouseY = null; hoverLayer = -1; });
  canvas.addEventListener('click', () => { speedBoost = 2.4; });
  window.addEventListener('keydown', e => { if(e.code === 'Space'){ speedBoost = 2.4; e.preventDefault(); } });

  // initial
  stackBars[2].classList.add('active');
})();
</script>
</body>
</html>
