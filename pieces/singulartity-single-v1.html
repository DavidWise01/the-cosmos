<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>1×1×1 Singularity – Quantum Axiom Seed</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background-color: black; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #88aaff;
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 3px solid #88aaff;
            pointer-events: none;
            z-index: 10;
            font-size: 12px;
        }
        #title {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: #ffaa44;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            pointer-events: none;
            font-family: monospace;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            font-size: 10px;
            color: #ccc;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="title">⚛️ 1×1×1 SINGULARITY<br>Quantum Axiom | Cobalt Seed</div>
    <div id="info">
        🔹 Ternary seed: 3 states (input · process · output) in one cell<br>
        🔹 Dense cobalt core – deterministic anchor (Root0)<br>
        🔹 3/2/1 compression encoded as orbiting particles
    </div>
    <div class="controls">🖱️ Drag to rotate | Scroll to zoom</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010108);
        scene.fog = new THREE.FogExp2(0x010108, 0.008);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 1.5, 3);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);
        
        // Post-processing bloom for the cobalt glow
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.6;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.2;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.target.set(0, 0, 0);
        
        // --- Core: Dense Cobalt Ball (singularity) ---
        const coreGeometry = new THREE.SphereGeometry(0.55, 128, 128);
        const coreMaterial = new THREE.MeshStandardMaterial({
            color: 0x1a4c8a,
            emissive: 0x0a2a5a,
            emissiveIntensity: 0.45,
            metalness: 0.85,
            roughness: 0.25,
            flatShading: false
        });
        const core = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(core);
        
        // Inner shell (semi‑transparent, crystalline)
        const innerShellGeo = new THREE.SphereGeometry(0.68, 64, 64);
        const innerShellMat = new THREE.MeshPhongMaterial({
            color: 0x3a7cbb,
            emissive: 0x0,
            transparent: true,
            opacity: 0.15,
            side: THREE.DoubleSide
        });
        const innerShell = new THREE.Mesh(innerShellGeo, innerShellMat);
        scene.add(innerShell);
        
        // Outer aura (pulsing)
        const auraGeo = new THREE.SphereGeometry(0.85, 32, 32);
        const auraMat = new THREE.MeshBasicMaterial({
            color: 0x2a6aaa,
            transparent: true,
            opacity: 0.08,
            side: THREE.BackSide
        });
        const aura = new THREE.Mesh(auraGeo, auraMat);
        scene.add(aura);
        
        // --- Ternary particles: 3 orbiting points representing 3/2/1 ---
        // They orbit at different radii and speeds, encoding input, process, output.
        const particleGroup = new THREE.Group();
        const colors = [0xff6666, 0x66ff66, 0xffaa44]; // Red, Green, Gold
        const radii = [1.05, 1.25, 1.45];
        const speeds = [0.8, 1.2, 0.5];
        const labels = ["Input", "Process", "Output"];
        
        const particles = [];
        for (let i = 0; i < 3; i++) {
            const geo = new THREE.SphereGeometry(0.07, 24, 24);
            const mat = new THREE.MeshStandardMaterial({ color: colors[i], emissive: colors[i], emissiveIntensity: 0.4 });
            const particle = new THREE.Mesh(geo, mat);
            particle.userData = { radius: radii[i], speed: speeds[i], angle: (i * Math.PI * 2 / 3), label: labels[i] };
            particleGroup.add(particle);
            particles.push(particle);
        }
        scene.add(particleGroup);
        
        // Add tiny glowing trails (lines) from each particle to core
        const trailMat = new THREE.LineBasicMaterial({ color: 0x88aaff, transparent: true, opacity: 0.3 });
        const trails = [];
        for (let i = 0; i < 3; i++) {
            const points = [new THREE.Vector3(0,0,0), new THREE.Vector3(1,0,0)];
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geo, trailMat);
            scene.add(line);
            trails.push(line);
        }
        
        // --- Surrounding particles (quantum foam) ---
        const foamCount = 800;
        const foamGeo = new THREE.BufferGeometry();
        const foamPositions = new Float32Array(foamCount * 3);
        for (let i = 0; i < foamCount; i++) {
            // random points inside a sphere of radius 1.8
            const r = Math.cbrt(Math.random()) * 1.8;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            foamPositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
            foamPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            foamPositions[i*3+2] = r * Math.cos(phi);
        }
        foamGeo.setAttribute('position', new THREE.BufferAttribute(foamPositions, 3));
        const foamMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.008, transparent: true, opacity: 0.4 });
        const foam = new THREE.Points(foamGeo, foamMat);
        scene.add(foam);
        
        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(1, 2, 1.5);
        scene.add(mainLight);
        const backLight = new THREE.PointLight(0x4466aa, 0.6);
        backLight.position.set(-1, -1, -1.2);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xffaa66, 0.3);
        fillLight.position.set(0.8, 0.5, 1);
        scene.add(fillLight);
        
        // --- Simple starfield background ---
        const starGeo = new THREE.BufferGeometry();
        const starCount = 1500;
        const starPos = [];
        for (let i = 0; i < starCount; i++) {
            starPos.push((Math.random() - 0.5) * 200);
            starPos.push((Math.random() - 0.5) * 200);
            starPos.push((Math.random() - 0.5) * 80 - 40);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.5 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // --- Animation: orbit particles, pulse aura, rotate foam ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // Orbit the ternary particles
            particles.forEach((p, idx) => {
                const radius = p.userData.radius;
                const speed = p.userData.speed;
                const angle = time * speed + p.userData.angle;
                p.position.x = Math.cos(angle) * radius;
                p.position.z = Math.sin(angle) * radius;
                p.position.y = Math.sin(angle * 0.7) * radius * 0.5; // slight 3D wobble
                // Update trail line from particle to core
                const trail = trails[idx];
                const points = [p.position.clone(), new THREE.Vector3(0,0,0)];
                trail.geometry.dispose(); // clean up
                trail.geometry = new THREE.BufferGeometry().setFromPoints(points);
            });
            
            // Pulse the core and aura
            const scale = 1 + Math.sin(time * 5) * 0.02;
            core.scale.set(scale, scale, scale);
            aura.scale.setScalar(1 + Math.sin(time * 3) * 0.03);
            
            // Rotate quantum foam slowly
            foam.rotation.y += 0.002;
            foam.rotation.x += 0.001;
            
            // Rotate stars very slowly
            stars.rotation.y += 0.0005;
            
            controls.update(); // handles auto-rotate
            effectComposer.render();
        }
        
        animate();
        
        // Handle resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log("1×1×1 Singularity – Quantum Axiom Seed (Cobalt Core) active");
    </script>
</body>
</html>
