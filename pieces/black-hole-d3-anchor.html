<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CITADEL FOUNDATION // D2 FEED</title>
    <style>
        body { background: #05080a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #d4a84c; font-family: 'Orbitron'; }
        .foundation-block { width: 300px; height: 100px; border: 2px solid #4090ff; margin: 5px; position: relative; overflow: hidden; }
        .fill-layer { position: absolute; left: 0; bottom: 0; width: 0%; height: 100%; background: rgba(212, 168, 76, 0.4); animation: load 2s forwards; }
        @keyframes load { to { width: 100%; } }
        .stability-text { font-size: 20px; margin-top: 20px; text-shadow: 0 0 10px #d4a84c; }
    </style>
</head>
<body>
    <div class="foundation-block"><div class="fill-layer"></div></div>
    <div class="foundation-block"><div class="fill-layer" style="animation-delay: 1s;"></div></div>
    <div class="foundation-block"><div class="fill-layer" style="animation-delay: 2s;"></div></div>
    <div class="stability-text">STABILITY INDEX: 99.9% // D3 ANCHOR SECURE</div>
</body>
</html>
