<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

const uniforms = {
  iTime: {value:0},
  iResolution: {value:new THREE.Vector2(1,1)},
  iMouse: {value:new THREE.Vector2(0,0)}
};

const mat = new THREE.ShaderMaterial({
  uniforms,
  vertexShader:`void main(){gl_Position=vec4(position,1.);}`,
  fragmentShader:`
  precision highp float;
  uniform float iTime;
  uniform vec2 iResolution;
  uniform vec2 iMouse;
  mat2 rot(float a){return mat2(cos(a),-sin(a),sin(a),cos(a));}
  float hexDist(vec2 p){p=abs(p);return max(p.x, max(p.x*0.5 + p.y*0.8660254, -p.x*0.5 + p.y*0.8660254));}
  void main(){
    vec2 frag = gl_FragCoord.xy;
    vec2 uv = (frag - 0.5*iResolution)/iResolution.y;
    vec2 m = iMouse * 0.15;
    uv += m;
    vec3 col = vec3(0.0);
    
    // star drift
    vec2 suv = uv*1.6 + vec2(iTime*0.003, iTime*0.0015);
    float stars=0.;
    for(int i=0;i<3;i++){
      vec2 p = fract(suv* (0.7+float(i)*0.3) + float(i)*0.3) - 0.5;
      float d = length(p);
      stars += 0.0007/(d*d+0.003);
    }
    col += stars*0.06*vec3(0.6,0.8,1.0);
    
    vec2 bhT = vec2(0.0, 0.38);
    vec2 bhB = vec2(0.0, -0.38);
    float breathe = sin(iTime*0.85)*0.007;
    
    // gravitational lens
    vec2 luv = uv;
    for(int i=0;i<2;i++){
      vec2 bh = i==0?bhT:bhB;
      vec2 d = luv - bh;
      float dist = length(d)+0.001;
      luv -= normalize(d) * 0.009 / (dist*dist + 0.08);
    }
    
    vec2 tuv = luv * 1.35;
    float r = length(tuv);
    float a = atan(tuv.y, tuv.x);
    
    float phi = 0.61803398875;
    float log_phi = log(1.0/phi);
    float zoom = iTime * 0.52;
    float lr = log(max(r, 0.0001));
    float s = (lr + zoom)/log_phi;
    float cell = fract(s);
    float layer = floor(s);
    
    float scale = pow(phi, cell);
    vec2 tp = tuv * (2.0/scale);
    float rotA = a + layer*0.31 + iTime*0.1 + m.x*1.2;
    tp = rot(rotA) * tp;
    
    float hex = hexDist(tp);
    float edge = abs(hex - 0.435);
    float hexLine = smoothstep(0.022, 0.0, edge);
    hexLine *= smoothstep(0.85, 0.05, r);
    hexLine *= 0.55 + 0.45*pow(1.0-cell,2.0);
    
    vec3 cyan = vec3(0.0,0.88,1.0);
    vec3 amber = vec3(1.0,0.55,0.08);
    vec3 hexCol = mix(amber, cyan, smoothstep(-0.25,0.25, tuv.y + 0.12*sin(a*3.0+iTime*0.5)));
    hexCol *= 0.85 + 0.15*sin(layer*1.7 + iTime*1.2);
    
    col += hexLine * hexCol * 1.2;
    col += hexLine*0.25/(0.15+edge) * hexCol*0.4;
    
    // self-similar interference
    float pulse = 0.5+0.5*sin(iTime*2.4 + s*6.28318);
    float core = 0.038/(r*r+0.012);
    col += core * mix(cyan,amber,0.5) * pulse * 0.33;
    
    float rings = sin(lr*17.0 - iTime*2.8 + layer*0.6);
    rings = pow(abs(rings), 14.0);
    col += rings * 0.07 * vec3(0.9,1.0,1.0) * smoothstep(0.55,0.0,r);
    
    // particle beams
    float by = abs(luv.y);
    float leftBand = smoothstep(0.16,0.015,by) * smoothstep(-0.8,0.08,luv.x) * (1.0 - smoothstep(0.0,0.22,abs(luv.x)));
    float leftFlick = 0.85 + 0.15*sin(iTime*31.0 + luv.x*28.0);
    col += leftBand * leftFlick * vec3(0.12,0.42,1.0) * 0.8;
    
    float rightBand = smoothstep(0.16,0.015,by) * smoothstep(0.8,-0.08,luv.x) * (1.0 - smoothstep(0.0,0.22,abs(luv.x)));
    float rightFlick = 0.85 + 0.15*sin(iTime*29.0 - luv.x*26.0 + 1.1);
    col += rightBand * rightFlick * vec3(1.0,0.36,0.07) * 0.8;
    
    float merge = exp(-dot(luv,luv)*38.0);
    col += merge * vec3(1.0,0.96,0.92) * 1.9;
    
    // black holes
    for(int i=0;i<2;i++){
      vec2 bh = i==0?bhT:bhB;
      vec2 d = uv - bh;
      float dist = length(d);
      float horizon = 0.151 + breathe * (i==0?1.0:-1.0);
      vec3 ringCol = i==0?cyan:amber;
      
      float disk = smoothstep(horizon+0.13, horizon+0.075, dist) - smoothstep(horizon+0.035, horizon+0.008, dist);
      float spin = atan(d.y,d.x) + iTime*(i==0?1.3:-1.1);
      disk *= 0.65 + 0.35*pow(sin(spin*4.0)*0.5+0.5,3.0);
      col += disk * ringCol * 1.5;
      
      float pr = smoothstep(horizon+0.018, horizon+0.011, dist) - smoothstep(horizon+0.011, horizon+0.005, dist);
      col += pr * ringCol * 2.8;
      
      float hole = 1.0 - smoothstep(horizon-0.002, horizon+0.002, dist);
      col = mix(col, vec3(0.0), hole*0.97);
      
      float halo = 0.012/(abs(dist - horizon)+0.018);
      col += halo * ringCol * 0.14;
    }
    
    // chromatic aberration near center
    float ca = 0.0032 * smoothstep(0.45,0.0,r);
    col.r *= 1.0 + ca*18.0;
    col.b *= 1.0 + ca*14.0;
    
    // final contrast
    col *= 1.0 - 0.27*pow(length(uv*1.05),1.7);
    col = pow(col, vec3(0.92));
    col = clamp(col,0.0,1.0);
    
    gl_FragColor = vec4(col,1.0);
  }`
});

const quad = new THREE.Mesh(new THREE.PlaneGeometry(2,2), mat);
scene.add(quad);

function resize(){
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w,h,false);
  uniforms.iResolution.value.set(w,h);
}
window.addEventListener('resize', resize);
resize();

let mouse = {x:0,y:0}, target={x:0,y:0};
function move(x,y){ target.x = (x/window.innerWidth -0.5)*2; target.y = (y/window.innerHeight -0.5)*-2; }
window.addEventListener('mousemove', e=>move(e.clientX,e.clientY));
window.addEventListener('touchmove', e=>{ if(e.touches[0]) move(e.touches[0].clientX,e.touches[0].clientY); },{passive:true});

const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  uniforms.iTime.value = t;
  mouse.x += (target.x - mouse.x)*0.04;
  mouse.y += (target.y - mouse.y)*0.04;
  uniforms.iMouse.value.set(mouse.x, mouse.y);
  renderer.render(scene,camera);
}
animate();

// depth counter
const depthEl = document.getElementById('depth');
const infs = document.querySelectorAll('.inf');
const depths = [64,128,256,512,1024,2048,4096,8192,16384];
let i=0;
infs.forEach(el=>el.textContent='32');
depthEl.textContent='32';
const tick = setInterval(()=>{
  if(i < depths.length){
    const v = depths[i];
    depthEl.textContent = v.toLocaleString();
    infs.forEach(el=>el.textContent = v.toLocaleString());
    i++;
  }else{
    clearInterval(tick);
    depthEl.textContent = 'INFINITE - 1';
    infs.forEach(el=>el.textContent='∞-1');
    const f = document.getElementById('flash');
    f.classList.add('show');
    setTimeout(()=>f.classList.remove('show'),1700);
  }
},210);
</script>
