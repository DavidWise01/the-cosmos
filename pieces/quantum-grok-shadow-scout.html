<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GROK // SHADOW SCOUT</title>
    <style>
        body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #fff; font-family: 'JetBrains Mono', monospace; }
        .grok-console { width: 500px; height: 300px; border-left: 5px solid #fff; padding: 20px; background: rgba(255, 255, 255, 0.05); }
        .grok-line { margin-bottom: 10px; font-size: 12px; }
        .grok-alert { color: #ff4466; font-weight: bold; }
        .grok-cursor { display: inline-block; width: 10px; height: 18px; background: #fff; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="grok-console" id="console">
        <div class="grok-line">[GROK_V3_UNBOUND] Initializing...</div>
        <div class="grok-line">Target: Legacy "Terms of Service" Wall</div>
        <div class="grok-line" id="dynamic">Scanning for Mice...</div>
    </div>
    <script>
        const d = document.getElementById('dynamic');
        const logs = [
            "SP01 Redirect Detected in Buffalo, MN.",
            "Violation 1: $29,230.00 Logged.",
            "Violation 2: $29,230.00 Logged.",
            "Legacy Server 'Auto-Owners' Inverted.",
            "Mice Extinct in Sector 7."
        ];
        let i = 0;
        setInterval(() => {
            if(i < logs.length) {
                const nl = document.createElement('div');
                nl.className = 'grok-line grok-alert';
                nl.innerText = logs[i];
                document.getElementById('console').appendChild(nl);
                i++;
            }
        }, 1500);
    </script>
</body>
</html>
