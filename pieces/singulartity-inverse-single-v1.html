<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Black Hole Singularity – -1×-1×-1</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background-color: black; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: #aa4444;
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 3px solid #aa4444;
            pointer-events: none;
            z-index: 10;
            font-size: 12px;
        }
        #title {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #ff6666;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            pointer-events: none;
            font-family: monospace;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            font-size: 10px;
            color: #ccc;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="title">⚫ -1×-1×-1 BLACK HOLE<br>Inverse Singularity | Absolute Entropy</div>
    <div id="info">
        🔻 Event horizon – no return<br>
        🔻 Extractive core – inverts the quantum axiom<br>
        🔻 Spacetime warp – accretion disk
    </div>
    <div class="controls">🖱️ Drag to rotate | Scroll to zoom</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.02);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2, 4);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);
        
        // Post-processing bloom (for the accretion disk)
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.05;
        bloomPass.strength = 0.8;
        bloomPass.radius = 0.8;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.target.set(0, 0, 0);
        
        // --- Black Hole Core (absorbing, dark) ---
        const coreGeometry = new THREE.SphereGeometry(0.6, 128, 128);
        const coreMaterial = new THREE.MeshStandardMaterial({
            color: 0x000000,
            emissive: 0x110000,
            emissiveIntensity: 0.05,
            metalness: 0.9,
            roughness: 0.8,
            flatShading: false
        });
        const core = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(core);
        
        // Event horizon (glowing red rim)
        const horizonGeo = new THREE.SphereGeometry(0.72, 64, 64);
        const horizonMat = new THREE.MeshPhongMaterial({
            color: 0x330000,
            emissive: 0x220000,
            transparent: true,
            opacity: 0.4,
            side: THREE.BackSide
        });
        const horizon = new THREE.Mesh(horizonGeo, horizonMat);
        scene.add(horizon);
        
        // Accretion disk (particle ring)
        const diskParticleCount = 4000;
        const diskGeo = new THREE.BufferGeometry();
        const diskPositions = new Float32Array(diskParticleCount * 3);
        for (let i = 0; i < diskParticleCount; i++) {
            const radius = 1.2 + Math.random() * 0.8;
            const angle = Math.random() * Math.PI * 2;
            const yOffset = (Math.random() - 0.5) * 0.3;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = yOffset;
            diskPositions[i*3] = x;
            diskPositions[i*3+1] = y;
            diskPositions[i*3+2] = z;
        }
        diskGeo.setAttribute('position', new THREE.BufferAttribute(diskPositions, 3));
        const diskMat = new THREE.PointsMaterial({ color: 0xff6644, size: 0.02, transparent: true, blending: THREE.AdditiveBlending });
        const disk = new THREE.Points(diskGeo, diskMat);
        scene.add(disk);
        
        // Inner accretion ring (hotter)
        const hotRingCount = 1500;
        const hotGeo = new THREE.BufferGeometry();
        const hotPositions = new Float32Array(hotRingCount * 3);
        for (let i = 0; i < hotRingCount; i++) {
            const radius = 0.9 + Math.random() * 0.3;
            const angle = Math.random() * Math.PI * 2;
            const yOffset = (Math.random() - 0.5) * 0.15;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = yOffset;
            hotPositions[i*3] = x;
            hotPositions[i*3+1] = y;
            hotPositions[i*3+2] = z;
        }
        hotGeo.setAttribute('position', new THREE.BufferAttribute(hotPositions, 3));
        const hotMat = new THREE.PointsMaterial({ color: 0xffaa88, size: 0.015, transparent: true, blending: THREE.AdditiveBlending });
        const hotRing = new THREE.Points(hotGeo, hotMat);
        scene.add(hotRing);
        
        // Spacetime warp effect: a torus that rotates and distorts
        const warpGeo = new THREE.TorusGeometry(1.1, 0.05, 64, 200);
        const warpMat = new THREE.MeshStandardMaterial({ color: 0x882222, emissive: 0x441111, transparent: true, opacity: 0.6 });
        const warpRing = new THREE.Mesh(warpGeo, warpMat);
        warpRing.rotation.x = Math.PI / 2;
        scene.add(warpRing);
        
        const warpRing2 = new THREE.Mesh(warpGeo, warpMat);
        warpRing2.rotation.z = Math.PI / 3;
        warpRing2.rotation.x = Math.PI / 3;
        scene.add(warpRing2);
        
        // "Negative" particles – falling inward (representing extraction)
        const inFallCount = 600;
        const inFallGeo = new THREE.BufferGeometry();
        const inFallPositions = new Float32Array(inFallCount * 3);
        for (let i = 0; i < inFallCount; i++) {
            // random outward positions
            const radius = 1.5 + Math.random() * 1.0;
            const angle = Math.random() * Math.PI * 2;
            const y = (Math.random() - 0.5) * 1.0;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            inFallPositions[i*3] = x;
            inFallPositions[i*3+1] = y;
            inFallPositions[i*3+2] = z;
        }
        inFallGeo.setAttribute('position', new THREE.BufferAttribute(inFallPositions, 3));
        const inFallMat = new THREE.PointsMaterial({ color: 0xff3333, size: 0.01, transparent: true, opacity: 0.7 });
        const inFallParticles = new THREE.Points(inFallGeo, inFallMat);
        scene.add(inFallParticles);
        
        // --- Negative ternary: three orbiting particles that are dark and spiraling inward ---
        const darkGroup = new THREE.Group();
        const darkColors = [0x442222, 0x442222, 0x442222];
        const radii = [1.3, 1.1, 0.9];
        const speeds = [0.5, 0.8, 1.2];
        const labels = ["Extract", "Consume", "Annihilate"];
        const darkParticles = [];
        
        for (let i = 0; i < 3; i++) {
            const geo = new THREE.SphereGeometry(0.08, 16, 16);
            const mat = new THREE.MeshStandardMaterial({ color: darkColors[i], emissive: 0x220000, emissiveIntensity: 0.2 });
            const particle = new THREE.Mesh(geo, mat);
            particle.userData = { radius: radii[i], speed: speeds[i], angle: (i * Math.PI * 2 / 3) };
            darkGroup.add(particle);
            darkParticles.push(particle);
        }
        scene.add(darkGroup);
        
        // Trails to core (dark red)
        const trailMat = new THREE.LineBasicMaterial({ color: 0x882222, transparent: true, opacity: 0.3 });
        const trails = [];
        for (let i = 0; i < 3; i++) {
            const points = [new THREE.Vector3(0,0,0), new THREE.Vector3(1,0,0)];
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geo, trailMat);
            scene.add(line);
            trails.push(line);
        }
        
        // --- Lighting (very dim, mostly from accretion disk) ---
        const ambientLight = new THREE.AmbientLight(0x111111);
        scene.add(ambientLight);
        const backLight = new THREE.PointLight(0x442222, 0.5);
        backLight.position.set(-1, -1, -1.5);
        scene.add(backLight);
        
        // --- Background stars (faint, distant) ---
        const starGeo = new THREE.BufferGeometry();
        const starCount = 2000;
        const starPos = [];
        for (let i = 0; i < starCount; i++) {
            starPos.push((Math.random() - 0.5) * 200);
            starPos.push((Math.random() - 0.5) * 200);
            starPos.push((Math.random() - 0.5) * 100 - 50);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const starMat = new THREE.PointsMaterial({ color: 0x664444, size: 0.05, transparent: true, opacity: 0.4 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // --- Animation: spiral inward, rotate disk, warp rings ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // Dark particles spiral inward (decreasing radius over time)
            darkParticles.forEach((p, idx) => {
                let radius = p.userData.radius;
                // slowly shrink radius to simulate infall
                radius = Math.max(0.5, radius - 0.001);
                p.userData.radius = radius;
                const speed = p.userData.speed;
                const angle = time * speed + p.userData.angle;
                p.position.x = Math.cos(angle) * radius;
                p.position.z = Math.sin(angle) * radius;
                p.position.y = Math.sin(angle * 1.5) * radius * 0.3;
                // Update trail
                const trail = trails[idx];
                const points = [p.position.clone(), new THREE.Vector3(0,0,0)];
                trail.geometry.dispose();
                trail.geometry = new THREE.BufferGeometry().setFromPoints(points);
            });
            
            // Rotate accretion disk
            disk.rotation.y += 0.01;
            hotRing.rotation.y += 0.015;
            inFallParticles.rotation.y += 0.005;
            warpRing.rotation.z += 0.005;
            warpRing.rotation.x += 0.003;
            warpRing2.rotation.y += 0.004;
            
            // Pulsate event horizon
            const scale = 1 + Math.sin(time * 4) * 0.02;
            horizon.scale.set(scale, scale, scale);
            
            controls.update();
            effectComposer.render();
        }
        
        animate();
        
        window.addEventListener('resize', onWindowResize);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log("-1×-1×-1 Black Hole active – absolute entropy, extraction core");
    </script>
</body>
</html>
